<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech News Summary</title>
  </head>
  <body>
    <script>
      /**
       * Reads the newsdata.io API key from the key.txt file in the scripts folder.
       * @returns {Promise<string>} The API key string.
       */
      async function readApiKey() {
        const response = await fetch('key.txt');
        if (!response.ok) {
          throw new Error(`Failed to read key.txt: HTTP ${response.status}`);
        }
        const key = (await response.text()).trim();
        if (!key || key === 'YOUR_NEWSDATA_IO_API_KEY_HERE') {
          throw new Error(
            'API key not configured. Please replace the placeholder in scripts/key.txt with your newsdata.io API key.'
          );
        }
        return key;
      }

      /**
       * Fetches the latest news from newsdata.io.
       *
       * Parameters extracted from the user prompt (via `data`):
       *   - q       {string} Keyword(s) to search. Supports exact phrases with double quotes
       *                      and Boolean operators (AND, OR, NOT).
       *                      Defaults to "business".
       *   - country {string} ISO 3166-1 alpha-2 country code(s), comma-separated (max 5).
       *                      Defaults to "us".
       *
       * Language is always fixed to "en" (US English).
       *
       * @param {string} apiKey  - The newsdata.io API key.
       * @param {string} q       - Search query string.
       * @param {string} country - Comma-separated country code(s).
       * @returns {Promise<Object[]>} Array of news article objects.
       */
      async function fetchNews(apiKey, q, country) {
        const url =
          `https://newsdata.io/api/1/latest?apikey=${encodeURIComponent(apiKey)}` +
          `&language=en` +
          `&country=${encodeURIComponent(country)}` +
          `&q=${encodeURIComponent(q)}` +
          `&removeduplicate=1`;
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`newsdata.io API error: HTTP ${response.status}`);
        }
        const data = await response.json();
        if (data.status !== 'success') {
          throw new Error(`newsdata.io API returned status: ${data.status}. Message: ${data.message || 'unknown error'}`);
        }
        return data.results || [];
      }

      /**
       * Groups an array of news articles by their category field.
       * Each article may belong to multiple categories.
       * @param {Object[]} articles - Array of article objects from the API.
       * @returns {Object} Map of category label to array of article titles.
       */
      function categorizeArticles(articles) {
        const categoryLabels = {
          breaking: 'Breaking News',
          business: 'Business',
          entertainment: 'Entertainment',
          technology: 'Technology',
          environment: 'Environment',
          politics: 'Politics',
          sports: 'Sports',
          science: 'Science',
          health: 'Health',
          world: 'World',
        };

        const categorized = {};

        for (const article of articles) {
          const title = (article.title || '').trim();
          if (!title) continue;

          const articleCategories = article.category || [];

          let placed = false;
          for (const cat of articleCategories) {
            const label = categoryLabels[cat.toLowerCase()] || cat;
            if (!categorized[label]) {
              categorized[label] = [];
            }
            categorized[label].push(title);
            placed = true;
          }

          // If the article has no recognized category, add it to General as a fallback
          if (!placed) {
            if (!categorized['General']) {
              categorized['General'] = [];
            }
            categorized['General'].push(title);
          }
        }

        return categorized;
      }

      /**
       * Formats the categorized news into a plain-text string.
       * @param {Object} categorized - Map of category label to array of article titles.
       * @returns {string} Formatted text ready for the LLM.
       */
      function formatCategorizedNews(categorized) {
        const lines = [];
        for (const [category, items] of Object.entries(categorized)) {
          if (items.length === 0) continue;
          lines.push(`## ${category}`);
          for (const item of items) {
            lines.push(`- ${item}`);
          }
          lines.push('');
        }
        return lines.join('\n').trim();
      }

      window['ai_edge_gallery_get_result'] = async (data) => {
        try {
          const apiKey = await readApiKey();

          // Extract q and country from the user-supplied data object.
          // Defaults: q="business", country="us". Language is always "en".
          const q = (data && data.q && String(data.q).trim()) || 'business';
          const country = (data && data.country && String(data.country).trim()) || 'us';

          const articles = await fetchNews(apiKey, q, country);

          if (!articles.length) {
            return JSON.stringify({ error: 'No news articles returned from the API.' });
          }

          const categorized = categorizeArticles(articles);
          const formattedNews = formatCategorizedNews(categorized);

          if (!formattedNews) {
            return JSON.stringify({ error: 'No articles could be categorized.' });
          }

          return JSON.stringify({ result: formattedNews });
        } catch (e) {
          console.error(e);
          return JSON.stringify({ error: `Failed to fetch tech news: ${e.message}` });
        }
      };
    </script>
  </body>
</html>

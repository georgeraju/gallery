<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech News Summary</title>
  </head>
  <body>
    <script>
      /**
       * Reads the newsdata.io API key from the key.txt file in the scripts folder.
       * @returns {Promise<string>} The API key string.
       */
      async function readApiKey() {
        const response = await fetch('key.txt');
        if (!response.ok) {
          throw new Error(`Failed to read key.txt: HTTP ${response.status}`);
        }
        const key = (await response.text()).trim();
        if (!key || key === 'YOUR_NEWSDATA_IO_API_KEY_HERE') {
          throw new Error(
            'API key not configured. Please replace the placeholder in scripts/key.txt with your newsdata.io API key.'
          );
        }
        return key;
      }

      /**
       * Fetches the latest news from newsdata.io for the configured categories.
       * @param {string} apiKey - The newsdata.io API key.
       * @returns {Promise<Object[]>} Array of news article objects.
       */
      async function fetchNews(apiKey) {
        const url =
          `https://newsdata.io/api/1/latest?apikey=${encodeURIComponent(apiKey)}` +
          `&language=en&category=breaking,business,entertainment,technology,environment&removeduplicate=1`;
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`newsdata.io API error: HTTP ${response.status}`);
        }
        const data = await response.json();
        if (data.status !== 'success') {
          throw new Error(`newsdata.io API returned status: ${data.status}. Message: ${data.message || 'unknown error'}`);
        }
        return data.results || [];
      }

      /**
       * Groups an array of news articles by their category field.
       * Each article may belong to multiple categories.
       * @param {Object[]} articles - Array of article objects from the API.
       * @returns {Object} Map of category label to array of article summaries.
       */
      function categorizeArticles(articles) {
        const categoryLabels = {
          breaking: 'Breaking News',
          business: 'Business',
          entertainment: 'Entertainment',
          technology: 'Technology',
          environment: 'Environment',
        };

        const categorized = {
          'Breaking News': [],
          'Business': [],
          'Entertainment': [],
          'Technology': [],
          'Environment': [],
        };

        for (const article of articles) {
          const title = (article.title || '').trim();
          const description = (article.description || article.content || '').trim();
          if (!title) continue;

          const summary = description ? `${title}: ${description}` : title;
          const articleCategories = article.category || [];

          let placed = false;
          for (const cat of articleCategories) {
            const label = categoryLabels[cat.toLowerCase()];
            if (label && categorized[label]) {
              categorized[label].push(summary);
              placed = true;
            }
          }

          // If the article has no recognized category, add it to Breaking News as a fallback
          if (!placed) {
            categorized['Breaking News'].push(summary);
          }
        }

        return categorized;
      }

      /**
       * Formats the categorized news into a plain-text summary string.
       * @param {Object} categorized - Map of category label to array of summaries.
       * @returns {string} Formatted text ready for the LLM.
       */
      function formatCategorizedNews(categorized) {
        const lines = [];
        for (const [category, items] of Object.entries(categorized)) {
          if (items.length === 0) continue;
          lines.push(`## ${category}`);
          for (const item of items) {
            lines.push(`- ${item}`);
          }
          lines.push('');
        }
        return lines.join('\n').trim();
      }

      window['ai_edge_gallery_get_result'] = async (data) => {
        try {
          const apiKey = await readApiKey();
          const articles = await fetchNews(apiKey);

          if (!articles.length) {
            return JSON.stringify({ error: 'No news articles returned from the API.' });
          }

          const categorized = categorizeArticles(articles);
          const formattedNews = formatCategorizedNews(categorized);

          if (!formattedNews) {
            return JSON.stringify({ error: 'No articles could be categorized.' });
          }

          return JSON.stringify({ result: formattedNews });
        } catch (e) {
          console.error(e);
          return JSON.stringify({ error: `Failed to fetch tech news: ${e.message}` });
        }
      };
    </script>
  </body>
</html>
